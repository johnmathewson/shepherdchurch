[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Cache headers ──────────────────────────────────────────────────────────────
# Next.js JS/CSS chunks are content-hashed → cache forever, auto-bust on deploy.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages must never be stale — always revalidate so users get the latest
# JS bundle references after a deploy instead of running old cached code.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# API routes / auth callbacks — never cache, never share.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
